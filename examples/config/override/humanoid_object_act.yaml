# @package _global_
# Override configuration for humanoid_object with contact guidance
dataset_name: omomo
robot_type: unitree_g1
embodiment_type: humanoid_object
task: move_largebox
viewer: mujoco-rerun
rerun_spawn: true
# contact guidance
contact_guidance: true
guidance_decay_ratio: 0.8
init_pos_actuator_gain: 10.0
init_pos_actuator_bias: 10.0
init_rot_actuator_gain: 0.3
init_rot_actuator_bias: 0.3
# actuator names for single object (no right_/left_ prefix)
object_pos_actuator_names:
  - object_pos_x
  - object_pos_y
  - object_pos_z
object_rot_actuator_names:
  - object_rot_x
  - object_rot_y
  - object_rot_z
# timing
sim_dt: 0.0166667
ref_dt: 0.0333333
trace_dt: 0.0333333
max_sim_steps: -1
horizon: 0.8
ctrl_dt: 0.1
knot_dt: 0.1
# annealing parameters
first_ctrl_noise_scale: 0.5
last_ctrl_noise_scale: 1.0
final_noise_scale: 0.1
joint_noise_scale: 0.1
# sampling
improvement_threshold: 0.0
max_num_iterations: 32
temperature: 1.0
num_samples: 2048
# reward
vel_rew_scale: 0.0
joint_rew_scale: 1.0
base_pos_rew_scale: 1.0
base_rot_rew_scale: 1.0
pos_rew_scale: 1.0
rot_rew_scale: 0.3
